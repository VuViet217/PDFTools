<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_editor">Chỉnh sửa PDF</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2.8">
    <script src="/static/js/i18n.js?v=3.9"></script>
    <script src="/static/js/header.js?v=2.0"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span>← PDF Tools</span>
            </a>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/split-merge" class="nav-link" data-i18n="nav_split_merge">Tách / Nối PDF</a>
                </li>
                <li class="nav-item">
                    <a href="/editor" class="nav-link" data-i18n="nav_editor">Chỉnh sửa PDF</a>
                </li>
                <li class="nav-item">
                    <a href="/compress" class="nav-link" data-i18n="nav_compress">Nén PDF</a>
                </li>
                <li class="nav-item">
                    <a href="/security" class="nav-link" data-i18n="nav_security">Bảo mật</a>
                </li>
                <li class="nav-item">
                    <a href="/pdf-to-image" class="nav-link" data-i18n="pdf_to_image_title">Chuyển đổi PDF sang Ảnh</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <h1 data-i18n="editor_title">Chỉnh sửa PDF</h1>
            
            <!-- Upload area (initial state) -->
            <div id="editorUploadArea" class="upload-area">
                <p data-i18n="upload_pdf_editor">Upload PDF để bắt đầu chỉnh sửa</p>
                <input type="file" id="editorFileInput" accept=".pdf" style="display:none;">
            </div>
            
            <!-- Editor main (hidden initially) -->
            <div id="editorMain" style="display:none;">
                <!-- Toolbar -->
                <div class="editor-toolbar">
                    <button id="selectAllBtn" class="btn btn-small" data-i18n="select_all">Chọn tất cả</button>
                    <button id="deselectAllBtn" class="btn btn-small" data-i18n="deselect_all">Bỏ chọn tất cả</button>
                    <button id="selectBlankBtn" class="btn btn-small" data-i18n="select_blank_pages">📄 Chọn trang trắng</button>
                    <button id="rotateBtn" class="btn btn-small" data-i18n="btn_rotate">Xoay 90°</button>
                    <button id="deleteBlankBtn" class="btn btn-small" data-i18n="btn_delete_blank">🗑 Xoá trang trắng</button>
                    <button id="reverseBtn" class="btn btn-small" data-i18n="btn_reverse">↕ Đảo thứ tự</button>
                    
                    <!-- Nút chèn file PDF mới (đứng trước nút Xóa) -->
                    <button id="insertPdfBtn" class="btn btn-small" data-i18n="btn_insert_pdf">➕ Chèn PDF</button>
                    <input type="file" id="insertFileInput" accept=".pdf" style="display:none;">
                    
                    <button id="insertBlankBtn" class="btn btn-small" data-i18n="btn_insert_blank">📄 Chèn trang trắng</button>
                    
                    <button id="watermarkBtn" class="btn btn-small" data-i18n="btn_watermark">🔤 Chèn Watermark</button>
                    
                    <button id="bulkDeleteBtn" class="btn btn-small btn-danger" data-i18n="bulk_delete">Xoá các trang đã chọn</button>
                </div>
                
                <!-- Thumbnails grid -->
                <div id="editorThumbnails" class="editor-thumbnails">
                    <!-- Thumbnails will be generated here -->
                </div>
                
                <!-- Export button -->
                <div class="button-group">
                    <button id="exportBtn" class="btn btn-primary" data-i18n="btn_export">📄 Xuất PDF</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal">
        <!-- Close Button -->
        <span class="modal-close">&times;</span>
        
        <!-- Zoom Controls Header -->
        <div class="modal-header-controls">
            <span id="previewCaption"></span>
            <div class="zoom-controls">
                <button id="zoomOutBtn" class="btn btn-secondary" title="Thu nhỏ">➖</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomInBtn" class="btn btn-secondary" title="Phóng to">➕</button>
                <button id="zoomResetBtn" class="btn btn-secondary" title="Vừa vặn">↺</button>
            </div>
        </div>

        <!-- Image Container -->
        <div id="previewContainer" class="preview-container">
            <img class="modal-content" id="previewImage">
        </div>
    </div>

    <!-- Watermark Modal -->
    <div id="watermarkModal" class="modal" style="justify-content: center; align-items: center;">
        <div class="dialog-content">
            <h3 data-i18n="watermark_prompt">Nhập chữ Watermark</h3>
            <input type="text" id="watermarkInput" class="form-control" data-i18n-placeholder="watermark_placeholder" placeholder="VD: BẢN NHÁP..." style="width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px;">
            <div class="button-group" style="justify-content: center; margin-top: 10px;">
                <button id="applyWatermarkBtn" class="btn btn-primary" style="min-width: 100px;">OK</button>
                <button id="cancelWatermarkBtn" class="btn btn-secondary" style="min-width: 100px;">Hủy</button>
            </div>
        </div>
    </div>


    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script>
        function showToast(message, type = "info") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.textContent = message;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add("remove");
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
        // Tự động dọn dẹp file tạm khi người dùng đóng tab
        window.addEventListener("beforeunload", function() {
            navigator.sendBeacon("/api/cleanup");
        });    </script>
    <script src="/static/js/editor.js?v=1.4"></script>
    <script src="/static/js/footer.js?v=2.5"></script>
</body>
</html>
