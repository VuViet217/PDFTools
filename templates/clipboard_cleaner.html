<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Cleaner | OVNC Tools</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2.8">
    <script src="/static/js/i18n.js?v=4.2"></script>
    <script src="/static/js/header.js?v=2.3"></script>
    <style>
        .main-content { flex: 1; padding: 40px; background: #f8f9fa; }
        .container { max-width: 1200px; margin: 0 auto; }
        .page-title {
            font-size: 32px; font-weight: 700; margin-bottom: 10px; color: #333;
            display: flex; align-items: center; gap: 15px;
        }
        .page-title-icon { font-size: 40px; }
        .page-desc { color: #666; margin-bottom: 30px; font-size: 15px; }

        /* Options bar */
        .options-bar {
            background: white; border-radius: 12px; padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
        }
        .options-bar label {
            display: flex; align-items: center; gap: 6px; cursor: pointer;
            font-size: 14px; color: #444; white-space: nowrap;
        }
        .options-bar input[type="checkbox"] {
            width: 16px; height: 16px; accent-color: #667eea; cursor: pointer;
        }
        .options-separator {
            width: 1px; height: 24px; background: #e0e0e0;
        }
        .case-select {
            padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; background: white; cursor: pointer;
        }

        /* Editor area */
        .editor-area {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .editor-panel {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex; flex-direction: column;
        }
        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .panel-label {
            font-weight: 600; font-size: 15px; color: #333;
            display: flex; align-items: center; gap: 8px;
        }
        .char-count { font-size: 12px; color: #999; }
        .text-area {
            width: 100%; min-height: 400px; border: 2px solid #e0e0e0;
            border-radius: 8px; padding: 14px; font-size: 14px; font-family: inherit;
            line-height: 1.6; resize: vertical; box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .text-area:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .text-area.output { background: #fafbfc; }

        /* Buttons */
        .action-bar {
            display: flex; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap;
        }
        .btn {
            padding: 12px 28px; border: none; border-radius: 8px; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-success { background: #4caf50; color: white; }
        .btn-success:hover { background: #43a047; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #f57c00; }

        /* Stats */
        .stats-bar {
            display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap;
        }
        .stat-item {
            font-size: 13px; color: #666;
            display: flex; align-items: center; gap: 4px;
        }
        .stat-value { font-weight: 600; color: #667eea; }

        /* Diff highlight */
        .diff-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 12px; font-weight: 600;
        }
        .diff-removed { background: #ffebee; color: #c62828; }
        .diff-cleaned { background: #e8f5e9; color: #2e7d32; }

        /* Copy notification */
        .copy-notification {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 12px 24px; border-radius: 8px;
            font-size: 14px; font-weight: 600; z-index: 9999;
            opacity: 0; transition: opacity 0.3s;
        }
        .copy-notification.show { opacity: 1; }

        @media (max-width: 768px) {
            .main-content { padding: 20px; }
            .editor-area { grid-template-columns: 1fr; }
            .text-area { min-height: 250px; }
            .page-title { font-size: 24px; }
            .options-bar { gap: 10px; }
        }
    </style>
</head>
<body>
    <!-- Header injected by header.js -->
    <main class="main-content">
        <div class="container">
            <h1 class="page-title">
                <span class="page-title-icon">🧹</span>
                <span data-i18n="cc_title">Clipboard Cleaner</span>
            </h1>
            <p class="page-desc" data-i18n="cc_desc">Làm sạch và chuẩn hóa văn bản copy từ PDF, website, email, Excel…</p>

            <!-- Options -->
            <div class="options-bar">
                <label><input type="checkbox" id="optMergeLines"> <span data-i18n="cc_opt_merge">Gộp dòng</span></label>
                <label><input type="checkbox" id="optRemoveSpaces" checked> <span data-i18n="cc_opt_spaces">Xóa khoảng trắng thừa</span></label>
                <label><input type="checkbox" id="optRemoveSpecial" checked> <span data-i18n="cc_opt_special">Xóa ký tự ẩn</span></label>
                <label><input type="checkbox" id="optFixPunctuation"> <span data-i18n="cc_opt_punctuation">Chuẩn hóa dấu câu</span></label>
                <label><input type="checkbox" id="optRemoveAccents"> <span data-i18n="cc_opt_accents">Bỏ dấu tiếng Việt</span></label>
                <div class="options-separator"></div>
                <label>
                    <span data-i18n="cc_opt_case">Chữ hoa/thường:</span>
                    <select id="optCase" class="case-select">
                        <option value="" data-i18n="cc_case_none">Không đổi</option>
                        <option value="upper" data-i18n="cc_case_upper">CHỮ HOA</option>
                        <option value="lower" data-i18n="cc_case_lower">chữ thường</option>
                        <option value="title" data-i18n="cc_case_title">Viết Hoa Đầu</option>
                    </select>
                </label>
            </div>

            <!-- Editor -->
            <div class="editor-area">
                <!-- Input -->
                <div class="editor-panel">
                    <div class="panel-header">
                        <span class="panel-label">📥 <span data-i18n="cc_input_label">Văn bản gốc</span></span>
                        <span class="char-count" id="inputCount">0</span>
                    </div>
                    <textarea class="text-area" id="inputText" data-i18n-placeholder="cc_input_placeholder"></textarea>
                </div>

                <!-- Output -->
                <div class="editor-panel">
                    <div class="panel-header">
                        <span class="panel-label">📤 <span data-i18n="cc_output_label">Kết quả</span></span>
                        <span class="char-count" id="outputCount">0</span>
                    </div>
                    <textarea class="text-area output" id="outputText" readonly data-i18n-placeholder="cc_output_placeholder"></textarea>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-bar" id="statsBar" style="display:none;">
                <div class="stat-item">
                    <span data-i18n="cc_stat_chars_removed">Ký tự đã xóa:</span>
                    <span class="stat-value" id="statCharsRemoved">0</span>
                </div>
                <div class="stat-item">
                    <span data-i18n="cc_stat_lines_before">Số dòng trước:</span>
                    <span class="stat-value" id="statLinesBefore">0</span>
                </div>
                <div class="stat-item">
                    <span data-i18n="cc_stat_lines_after">Số dòng sau:</span>
                    <span class="stat-value" id="statLinesAfter">0</span>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="action-bar">
                <button class="btn btn-primary" id="btnClean" data-i18n="cc_btn_clean">🧹 Làm sạch</button>
                <button class="btn btn-success" id="btnCopy" disabled data-i18n="cc_btn_copy">📋 Copy kết quả</button>
                <button class="btn btn-warning" id="btnReplace" disabled data-i18n="cc_btn_replace">🔄 Thay thế input</button>
                <button class="btn btn-secondary" id="btnClear" data-i18n="cc_btn_clear">🗑 Xóa tất cả</button>
            </div>
        </div>
    </main>

    <div class="copy-notification" id="copyNotification"></div>
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/footer.js?v=2.5"></script>
    <script>
        // ============================================================================
        // Elements
        // ============================================================================
        const inputText   = document.getElementById('inputText');
        const outputText  = document.getElementById('outputText');
        const inputCount  = document.getElementById('inputCount');
        const outputCount = document.getElementById('outputCount');
        const statsBar    = document.getElementById('statsBar');
        const btnClean    = document.getElementById('btnClean');
        const btnCopy     = document.getElementById('btnCopy');
        const btnReplace  = document.getElementById('btnReplace');
        const btnClear    = document.getElementById('btnClear');

        // ============================================================================
        // Character counter
        // ============================================================================
        function updateCounts() {
            const lang = (typeof currentLang !== 'undefined') ? currentLang : 'vi';
            const charLabel = lang === 'ja' ? '文字' : ' ký tự';
            inputCount.textContent = inputText.value.length + charLabel;
            outputCount.textContent = outputText.value.length + charLabel;
        }
        inputText.addEventListener('input', updateCounts);

        // ============================================================================
        // Clean text
        // ============================================================================
        btnClean.addEventListener('click', async () => {
            const text = inputText.value;
            if (!text.trim()) {
                showToast(t('cc_error_empty'), 'error');
                return;
            }

            const options = {
                merge_lines: document.getElementById('optMergeLines').checked,
                remove_extra_spaces: document.getElementById('optRemoveSpaces').checked,
                remove_special_chars: document.getElementById('optRemoveSpecial').checked,
                fix_punctuation: document.getElementById('optFixPunctuation').checked,
                remove_vietnamese_accents: document.getElementById('optRemoveAccents').checked,
                change_case: document.getElementById('optCase').value,
            };

            btnClean.disabled = true;
            btnClean.textContent = t('cc_processing');

            try {
                const response = await fetch('/api/clean-text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, options }),
                });

                if (response.ok) {
                    const data = await response.json();
                    outputText.value = data.cleaned_text;
                    btnCopy.disabled = false;
                    btnReplace.disabled = false;

                    // Stats
                    const charsRemoved = text.length - data.cleaned_text.length;
                    const linesBefore = text.split('\n').length;
                    const linesAfter = data.cleaned_text.split('\n').length;
                    document.getElementById('statCharsRemoved').textContent = charsRemoved;
                    document.getElementById('statLinesBefore').textContent = linesBefore;
                    document.getElementById('statLinesAfter').textContent = linesAfter;
                    statsBar.style.display = 'flex';

                    updateCounts();
                    showToast(t('cc_success'), 'success');
                } else {
                    const err = await response.json();
                    showToast(err.detail || t('toast_error'), 'error');
                }
            } catch (e) {
                console.error(e);
                showToast(t('toast_error'), 'error');
            } finally {
                btnClean.disabled = false;
                btnClean.textContent = t('cc_btn_clean');
            }
        });

        // ============================================================================
        // Copy result
        // ============================================================================
        btnCopy.addEventListener('click', async () => {
            if (!outputText.value) return;
            try {
                await navigator.clipboard.writeText(outputText.value);
                showCopyNotification();
            } catch {
                outputText.select();
                document.execCommand('copy');
                showCopyNotification();
            }
        });

        function showCopyNotification() {
            const el = document.getElementById('copyNotification');
            el.textContent = t('cc_copied');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        // ============================================================================
        // Replace input with output
        // ============================================================================
        btnReplace.addEventListener('click', () => {
            if (!outputText.value) return;
            inputText.value = outputText.value;
            outputText.value = '';
            btnCopy.disabled = true;
            btnReplace.disabled = true;
            statsBar.style.display = 'none';
            updateCounts();
        });

        // ============================================================================
        // Clear all
        // ============================================================================
        btnClear.addEventListener('click', () => {
            inputText.value = '';
            outputText.value = '';
            btnCopy.disabled = true;
            btnReplace.disabled = true;
            statsBar.style.display = 'none';
            updateCounts();
        });

        // ============================================================================
        // Toast
        // ============================================================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('remove');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============================================================================
        // i18n
        // ============================================================================
        function waitAndApply() {
            if (typeof applyLang === 'function' && typeof TRANSLATIONS !== 'undefined') {
                applyLang();
                updateCounts();
            } else {
                setTimeout(waitAndApply, 50);
            }
        }
        waitAndApply();

        document.addEventListener('languageChanged', () => {
            applyLang();
            updateCounts();
            // Re-translate select options
            document.querySelectorAll('#optCase option[data-i18n]').forEach(opt => {
                opt.textContent = t(opt.getAttribute('data-i18n'));
            });
        });

        // Cleanup
        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon('/api/cleanup');
        });
    </script>
</body>
</html>
