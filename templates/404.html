<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Trang không tìm thấy | OVNC Tools</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2.8">
    <script src="/static/js/i18n.js?v=3.9"></script>
    <script src="/static/js/header.js?v=2.0"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #f8f9fa;
        }

        .error-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
        }

        .error-content {
            text-align: center;
            color: white;
            max-width: 600px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.6s ease-out;
        }

        .error-title {
            font-size: 36px;
            font-weight: 700;
            margin: 20px 0 15px 0;
            animation: slideUp 0.6s ease-out;
        }

        .error-description {
            font-size: 16px;
            opacity: 0.95;
            margin-bottom: 30px;
            line-height: 1.6;
            animation: fadeIn 0.8s ease-out;
        }

        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out infinite;
        }

        .back-home-btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            border: none;
            animation: slideUp 0.8s ease-out;
        }

        .back-home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: #f0f0f0;
        }

        .back-home-btn:active {
            transform: translateY(-1px);
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 24px;
            }

            .error-description {
                font-size: 14px;
            }

            .error-icon {
                font-size: 60px;
            }

            .back-home-btn {
                padding: 12px 32px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Header will be injected by header.js -->
    
    <div class="error-container">
        <div class="error-content">
            <div class="error-icon">😕</div>
            <h1 class="error-code">404</h1>
            <h2 class="error-title" data-i18n="error_404_title">Trang không tìm thấy</h2>
            <p class="error-description" data-i18n="error_404_description">
                Xin lỗi, trang bạn đang tìm kiếm không tồn tại hoặc đã bị xóa. Vui lòng kiểm tra URL hoặc quay lại trang chủ.
            </p>
            <a href="/" class="back-home-btn" data-i18n="error_404_action">← Quay lại trang chủ</a>
        </div>
    </div>

    <!-- Footer will be injected by footer.js -->
    <script src="/static/js/footer.js?v=2.5"></script>
</body>
</html>
